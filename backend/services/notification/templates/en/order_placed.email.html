<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Order Placed</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1 style="color: #333;">Order Confirmed</h1>
  <p>Hello {{ customer_name }},</p>
  <p>Your order <strong>#{{ order_number }}</strong> has been placed successfully.</p>
  
  <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 20px 0;">
    <h3 style="margin-top: 0;">Order Details</h3>
    <p><strong>Product:</strong> {{ product_name }}</p>
    <p><strong>Quantity:</strong> {{ quantity }}</p>
    <p><strong>Total:</strong> {{ total }}</p>
  </div>
  
  <p>We'll notify you when your order is being prepared.</p>
  
  <a href="{{ action_url }}" style="display: inline-block; background: #007bff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px;">View Order</a>
  
  <p style="margin-top: 30px; color: #666; font-size: 12px;">
    Thank you for shopping with CONFIT.
  </p>
</body>
</html>
