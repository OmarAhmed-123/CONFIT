# CONFIT Docker Compose - GPU Configuration
# ==========================================
# Production deployment with GPU support

version: '3.8'

services:
  # ===========================================
  # Backend API Server
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: confit-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - model-cache:/root/.cache/huggingface
      - weights-data:/app/weights
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./confit.db}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - confit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Celery Worker (GPU Tasks)
  # ===========================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: confit-celery-worker
    restart: unless-stopped
    command: >
      celery -A services.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=10
      --queues=gpu,cpu
    volumes:
      - ./:/app
      - model-cache:/root/.cache/huggingface
      - weights-data:/app/weights
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./confit.db}
      - C_FORCE_ROOT=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - confit-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A services.workers.celery_app inspect ping -d celery@$HOSTNAME"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # Celery Beat (Scheduled Tasks)
  # ===========================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: confit-celery-beat
    restart: unless-stopped
    command: celery -A services.workers.celery_app beat --loglevel=info
    volumes:
      - ./:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    networks:
      - confit-network

  # ===========================================
  # Redis (Message Broker & Cache)
  # ===========================================
  redis:
    image: redis:7.2-alpine
    container_name: confit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    networks:
      - confit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Flower (Celery Monitoring)
  # ===========================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: confit-flower
    restart: unless-stopped
    command: celery -A services.workers.celery_app flower --port=5555 --url-prefix=flower
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_AUTH:-admin:admin}
    depends_on:
      - redis
      - celery-worker
    networks:
      - confit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  confit-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  model-cache:
    driver: local
  weights-data:
    driver: local
