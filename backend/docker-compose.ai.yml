# ─────────────────────────────────────────────────────────────────────────────
# CONFIT AI Services - Docker Compose Configuration
# ─────────────────────────────────────────────────────────────────────────────
# GPU-enabled microservices for AI inference
# Requires: NVIDIA Docker runtime, CUDA 12.1+

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # AI SERVICES
  # ─────────────────────────────────────────────────────────────────────────────

  ai-api:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: confit-ai-api
    restart: unless-stopped
    ports:
      - "${AI_API_PORT:-8001}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-confit}:${POSTGRES_PASSWORD:-confit123}@postgres:5432/${POSTGRES_DB:-confit}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CUDA_VISIBLE_DEVICES=0
      - TRANSFORMERS_CACHE=/app/.cache
      - HF_HOME=/app/.cache
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ai_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - confit-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ─────────────────────────────────────────────────────────────────────────────
  # AI WORKERS (Async Processing)
  # ─────────────────────────────────────────────────────────────────────────────

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: confit-ai-worker
    restart: unless-stopped
    command: celery -A workers.ai_celery_app worker --loglevel=info --concurrency=2
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-confit}:${POSTGRES_PASSWORD:-confit123}@postgres:5432/${POSTGRES_DB:-confit}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CUDA_VISIBLE_DEVICES=0
      - TRANSFORMERS_CACHE=/app/.cache
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ai_cache:/app/.cache
    depends_on:
      - redis
      - postgres
    networks:
      - confit-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ─────────────────────────────────────────────────────────────────────────────
  # MODEL CACHE SERVICE
  # ─────────────────────────────────────────────────────────────────────────────

  model-cache:
    image: redis:7-alpine
    container_name: confit-model-cache
    restart: unless-stopped
    ports:
      - "${MODEL_CACHE_PORT:-6380}:6379"
    volumes:
      - model_cache_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - confit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # VECTOR DATABASE (for Visual Search)
  # ─────────────────────────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    container_name: confit-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - confit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # INFERENCE CACHE (Redis for embeddings)
  # ─────────────────────────────────────────────────────────────────────────────

  inference-cache:
    image: redis:7-alpine
    container_name: confit-inference-cache
    restart: unless-stopped
    ports:
      - "${INFERENCE_CACHE_PORT:-6381}:6379"
    volumes:
      - inference_cache_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - confit-network

  # ─────────────────────────────────────────────────────────────────────────────
  # SHARED INFRASTRUCTURE
  # ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: confit-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-confit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-confit123}
      - POSTGRES_DB=${POSTGRES_DB:-confit}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - confit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-confit} -d ${POSTGRES_DB:-confit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: confit-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - confit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # MONITORING
  # ─────────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: confit-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - confit-network

  grafana:
    image: grafana/grafana:latest
    container_name: confit-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - confit-network

# ─────────────────────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────────────────────

networks:
  confit-network:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_cache:
    driver: local
  model_cache_data:
    driver: local
  inference_cache_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
