# ============================================================
# CONFIT — Production Nginx Configuration
# Optimized for Lighthouse 95+ Performance
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basic Settings ───────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    # Hide nginx version
    server_tokens off;
    
    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;
    
    # ── Gzip Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/json
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;
    
    gzip_disable "msie6";
    
    # ── Brotli Compression (if available) ─────────────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json;
    
    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # ── Rate Limiting ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;
    
    # ── SSL Configuration ────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # ── CDN & Static Asset Caching ────────────────────────────────
    map $sent_http_content_type $expires {
        default                    1h;
        text/html                  0;
        text/css                   1y;
        application/javascript     1y;
        application/x-javascript   1y;
        image/jpeg                 1y;
        image/png                  1y;
        image/gif                  1y;
        image/svg+xml              1y;
        image/webp                 1y;
        image/x-icon               1y;
        font/ttf                   1y;
        font/otf                   1y;
        font/woff                  1y;
        font/woff2                 1y;
        video/mp4                  1y;
        video/webm                 1y;
    }
    
    map $sent_http_content_type $cache_control {
        default                    "public, must-revalidate";
        text/html                  "no-cache";
        text/css                   "public, immutable";
        application/javascript     "public, immutable";
        image/jpeg                 "public, immutable";
        image/png                  "public, immutable";
        image/gif                  "public, immutable";
        image/svg+xml              "public, immutable";
        image/webp                 "public, immutable";
        font/ttf                   "public, immutable";
        font/woff                  "public, immutable";
        font/woff2                 "public, immutable";
    }
    
    # ── Upstream Definitions ──────────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:8000 weight=5;
        keepalive 32;
    }
    
    # ── Main Server Block ─────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name confit.app www.confit.app;
        
        # Redirect HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name confit.app www.confit.app;
        
        # SSL certificates (configure with your provider)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        
        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # ── Static Assets (CDN-like behavior) ─────────────────────
        location /assets/ {
            alias /var/www/assets/;
            
            # Aggressive caching for hashed assets
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            
            # Enable pre-compressed files
            gzip_static on;
            
            # Open file cache
            open_file_cache max=1000 inactive=30s;
            open_file_cache_valid 60s;
            open_file_cache_min_uses 2;
            open_file_cache_errors on;
            
            # Disable access logs for static files
            access_log off;
        }
        
        # ── Images ──────────────────────────────────────────────────
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            root /var/www;
            
            expires $expires;
            add_header Cache-Control $cache_control;
            
            # WebP support
            add_header Vary Accept;
            
            # Disable logging
            access_log off;
        }
        
        # ── Fonts ───────────────────────────────────────────────────
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            root /var/www;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            
            access_log off;
        }
        
        # ── API Proxy ───────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn conn 20;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            
            # Connection reuse
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Cache API responses (safe endpoints only)
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500;
            proxy_cache_bypass $http_authorization $http_cookie;
            
            # Don't cache authenticated requests
            proxy_no_cache $http_authorization;
        }
        
        # ── Authentication Rate Limiting ───────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # No caching for auth
            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        
        # ── Health Check ────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
        
        # ── Sitemap & Robots ────────────────────────────────────────
        location = /sitemap.xml {
            root /var/www;
            expires 1d;
            add_header Cache-Control "public";
        }
        
        location = /robots.txt {
            root /var/www;
            expires 1d;
            add_header Cache-Control "public";
        }
        
        # ── SPA Fallback ────────────────────────────────────────────
        location / {
            root /var/www;
            try_files $uri $uri/ /index.html;
            
            # HTML should not be cached
            expires 0;
            add_header Cache-Control "no-cache";
            
            # Security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
        
        # ── Error Pages ─────────────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www;
            internal;
        }
    }
    
    # ── Cache Zones ────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m 
                     max_size=100m inactive=60m use_temp_path=off;
}

# ── Performance Notes ───────────────────────────────────────────────
#
# 1. HTTP/2 enabled for multiplexing
# 2. Gzip/Brotli compression for text assets
# 3. Aggressive caching for static assets with immutable flag
# 4. Connection pooling with keepalive
# 5. Rate limiting for API protection
# 6. SSL with modern protocols only
# 7. CDN-like behavior for hashed assets
#
# For production CDN integration:
# - Use CloudFront, Cloudflare, or Fastly
# - Configure origin pull caching
# - Enable edge caching for API responses
# - Use signed URLs for private content
#
# ───────────────────────────────────────────────────────────────────
