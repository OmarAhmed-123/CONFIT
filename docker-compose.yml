# CONFIT — Docker Compose entrypoint
# ====================================
# FastAPI and the full backend stack are defined in `backend/docker-compose.yml`.
# Run from repo root:  docker compose up -d api postgres redis
# Or start everything: docker compose up -d
#
# Copy `backend/.env.example` → `backend/.env` and set at least DATABASE_URL / JWT / GEMINI_API_KEY for try-on.

include:
  - path: backend/docker-compose.yml
